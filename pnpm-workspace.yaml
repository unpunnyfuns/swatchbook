packages:
  - "apps/*"
  - "packages/*"

minimumReleaseAge: 1440
blockExoticSubdeps: true

allowBuilds:
  '@swc/core': true
  esbuild: true
  core-js: false

overrides:
  webpackbar: 7.0.0
  uuid: ^14.0.0
  ip-address: ^10.1.1
  serialize-javascript: ^7.0.5
  fast-uri: ^3.1.2
  hono: ^4.12.21
  '@babel/plugin-transform-modules-systemjs': ^7.29.4
  ws: ^8.20.1
  webpack-dev-server: ^5.2.4
  'brace-expansion@>=5': ^5.0.6
  qs: ^6.15.2
  shell-quote: ^1.8.4
  esbuild: ^0.28.1
  joi: ^17.13.4
  launch-editor: ^2.14.1
  # Scoped to the 4.x line: the flagged instance is js-yaml 4.1.x (dev
  # tooling); Docusaurus's front-matter parser needs 3.x, and a blanket
  # override force-upgrades it and breaks `docs#build`.
  'js-yaml@>=4': ^4.2.0
  '@babel/core': ^7.29.6
