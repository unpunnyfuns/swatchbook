name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Run in the pinned Playwright image (Chromium + system deps preinstalled)
    # so the media-capture step needs no `playwright install` and the browser
    # launches reliably — same container the test suite uses in ci.yml. The
    # Pages deploy actions below run fine inside it.
    container:
      image: ghcr.io/${{ github.repository }}/playwright:v1.59.1-noble
      options: --ipc=host
    env:
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      HOME: /root
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Don't write the GITHUB_TOKEN into .git/config of the checked-out
          # tree. The deploy-pages step uses actions/upload-pages-artifact
          # which would otherwise ship the token in the artifact
          # (zizmor's `artipacked` finding). No git push from this job.
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: turbo-docs-${{ github.sha }}
          restore-keys: |
            turbo-docs-

      - run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm turbo run build:storybook --filter=@unpunnyfuns/swatchbook-storybook

      - name: Capture frontpage media
        run: pnpm --filter @unpunnyfuns/swatchbook-docs capture

      - name: Build Docusaurus
        run: pnpm turbo run build --filter=@unpunnyfuns/swatchbook-docs

      - name: Merge Storybook into docs build
        run: |
          rm -rf apps/docs/build/storybook
          cp -r apps/storybook/storybook-static apps/docs/build/storybook

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: apps/docs/build

      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
