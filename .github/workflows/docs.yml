name: Docs

# Deploy on a docs-only push to main (immediate, for typo and link fixes),
# or when the release workflow publishes a new version (dispatched from
# release.yml's publish job). This keeps the live site tracking the
# published version rather than every push to main (#1414): a code change
# that lands on main without a release no longer redeploys the docs.
# workflow_dispatch also covers a manual redeploy.
on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      # docs.yml builds and embeds the reference Storybook, so a story-only
      # change to apps/storybook must also refresh the hosted site.
      - 'apps/storybook/**'
  workflow_dispatch:
    inputs:
      ref:
        description: Commit SHA or ref to build and deploy. Defaults to the triggering commit.
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Run in the pinned Playwright image (Chromium + system deps preinstalled)
    # so the media-capture step needs no `playwright install` and the browser
    # launches reliably — same container the test suite uses in ci.yml. The
    # Pages deploy actions below run fine inside it.
    container:
      image: ghcr.io/${{ github.repository }}/playwright:v1.59.1-noble
      options: --ipc=host
    env:
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      HOME: /root
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # A release dispatch passes the published commit SHA so the built
          # docs match the release; a push or bare manual run falls back to
          # the triggering commit.
          ref: ${{ inputs.ref || github.sha }}
          # Don't write the GITHUB_TOKEN into .git/config of the checked-out
          # tree. The deploy-pages step uses actions/upload-pages-artifact
          # which would otherwise ship the token in the artifact
          # (zizmor's `artipacked` finding). No git push from this job.
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: turbo-docs-${{ github.sha }}
          restore-keys: |
            turbo-docs-

      - run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm turbo run build:storybook --filter=@unpunnyfuns/swatchbook-storybook

      - name: Capture frontpage media
        run: pnpm --filter @unpunnyfuns/swatchbook-docs capture

      - name: Build docs
        run: pnpm turbo run build --filter=@unpunnyfuns/swatchbook-docs

      - name: Merge Storybook into docs build
        run: |
          rm -rf apps/docs/dist/storybook
          cp -r apps/storybook/storybook-static apps/docs/dist/storybook

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: apps/docs/dist

      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
