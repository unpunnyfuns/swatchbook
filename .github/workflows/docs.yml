name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Don't write the GITHUB_TOKEN into .git/config of the checked-out
          # tree. The deploy-pages step uses actions/upload-pages-artifact
          # which would otherwise ship the token in the artifact
          # (zizmor's `artipacked` finding). No git push from this job.
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-docs-${{ github.sha }}
          restore-keys: |
            turbo-docs-

      - run: pnpm install --frozen-lockfile

      - name: Build Docusaurus + Storybook
        run: pnpm turbo run build build:storybook --filter=@unpunnyfuns/swatchbook-docs --filter=@unpunnyfuns/swatchbook-storybook

      - name: Merge Storybook into docs build
        run: |
          rm -rf apps/docs/build/storybook
          cp -r apps/storybook/storybook-static apps/docs/build/storybook

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: apps/docs/build

      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
