name: Chromatic

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded PR runs — Chromatic is billed per snapshot, so stacking
# runs on rapid pushes wastes quota. Main runs complete so the baseline is
# always captured.
concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Chromatic reviews depend on commit history to deduplicate snapshots.
# Full depth fetch lets it baseline against the merge target rather than
# replaying every snapshot from scratch.
jobs:
  chromatic:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Don't block on a missing secret — forks and draft PRs without
    # access to CHROMATIC_PROJECT_TOKEN should skip cleanly.
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          # Chromatic doesn't upload artifacts, so the immediate
          # leak vector zizmor's `artipacked` rule flags doesn't
          # apply here. Setting `false` as defense-in-depth so the
          # rule stays clean for this workflow too.
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Storybook (turbo runs workspace-package builds first)
        # pnpm filter on its own bypasses turbo's task graph, so the
        # workspace packages (core / addon / blocks / switcher /
        # integrations) aren't built before Storybook tries to resolve
        # them from dist. Going through turbo pulls in the ^build
        # dependency declared on build:storybook in turbo.json and
        # produces the dist/ output each package needs.
        run: pnpm turbo run build:storybook --filter=@unpunnyfuns/swatchbook-storybook

      - name: Publish to Chromatic
        uses: chromaui/action@05812acac141ce7d317a3f787be88122bca27cf4 # v17.3.0
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/storybook
          storybookBuildDir: storybook-static
          exitZeroOnChanges: true
          # TurboSnap: only snapshot stories whose dependency graph
          # touched the diff. `--stats-json` in apps/storybook's
          # build:storybook script emits the preview-stats.json
          # Chromatic uses to compute the dependency graph; without it,
          # Chromatic falls back to capturing every story every run.
          onlyChanged: true
          # Return as soon as the upload is done; Chromatic's GitHub
          # integration reports the visual-diff status asynchronously via
          # a check, so blocking on server-side comparison just makes the
          # job hang.
          exitOnceUploaded: true
