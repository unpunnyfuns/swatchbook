name: Chromatic

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded PR runs — Chromatic is billed per snapshot, so stacking
# runs on rapid pushes wastes quota. Main runs complete so the baseline is
# always captured.
concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Chromatic reviews depend on commit history to deduplicate snapshots.
# Full depth fetch lets it baseline against the merge target rather than
# replaying every snapshot from scratch.
jobs:
  chromatic:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Don't block on a missing secret — runs without access to
    # CHROMATIC_PROJECT_TOKEN should skip cleanly. Forks fail the
    # same-repo check; Dependabot branches live in-repo but GitHub runs
    # their pull_request event in a restricted context that withholds
    # Actions secrets, so the token is empty and the job would fail. A
    # job skipped via `if:` reports a neutral result, so neither case
    # blocks the PR.
    if: ${{ github.actor != 'dependabot[bot]' && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # Chromatic doesn't upload artifacts, so the immediate
          # leak vector zizmor's `artipacked` rule flags doesn't
          # apply here. Setting `false` as defense-in-depth so the
          # rule stays clean for this workflow too.
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Storybook (turbo runs workspace-package builds first)
        # pnpm filter on its own bypasses turbo's task graph, so the
        # workspace packages (core / addon / blocks / switcher /
        # integrations) aren't built before Storybook tries to resolve
        # them from dist. Going through turbo pulls in the ^build
        # dependency declared on build:storybook in turbo.json and
        # produces the dist/ output each package needs.
        run: pnpm turbo run build:storybook --filter=@unpunnyfuns/swatchbook-storybook

      - name: Publish to Chromatic
        uses: chromaui/action@7ffa9343588f15ff3f4cde30e03cd23204ed6a9c # v17.7.2
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/storybook
          storybookBuildDir: storybook-static
          exitZeroOnChanges: true
          # TurboSnap: only snapshot stories whose dependency graph
          # touched the diff. `--stats-json` in apps/storybook's
          # build:storybook script emits the preview-stats.json
          # Chromatic uses to compute the dependency graph; without it,
          # Chromatic falls back to capturing every story every run.
          onlyChanged: true
          # TurboSnap traces the Storybook module graph, which resolves
          # workspace packages to their built `dist/` (gitignored). So a
          # change in a package's `src/` (component or CSS), or in the
          # dogfood token data, never maps to a story and would be
          # silently skipped, freezing a stale baseline. List those paths
          # as externals so any change there forces a full re-snapshot;
          # TurboSnap's savings still apply to docs / story / config-only
          # diffs.
          externals: |
            packages/*/src/**
            packages/tokens/tokens/**
          # Return as soon as the upload is done; Chromatic's GitHub
          # integration reports the visual-diff status asynchronously via
          # a check, so blocking on server-side comparison just makes the
          # job hang.
          exitOnceUploaded: true
