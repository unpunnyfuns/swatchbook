name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [24]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ matrix.node }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ matrix.node }}-

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run lint format:check typecheck test build

      - name: Verify changeset exists for publishable changes
        if: github.event_name == 'pull_request'
        run: pnpm exec changeset status --since=origin/main

      - name: Storybook interaction tests
        run: pnpm turbo run test:storybook

      - name: Build Storybook
        run: pnpm turbo run build:storybook

      - uses: actions/upload-artifact@v7
        with:
          name: storybook-static
          path: apps/storybook/storybook-static
          if-no-files-found: ignore
          retention-days: 7
