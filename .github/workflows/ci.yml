name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Pin to match apps/storybook/node_modules/playwright version. Bump in
    # the same PR as a Playwright upgrade — ships chromium + all system
    # deps pre-installed, so we skip `apt-get install` entirely.
    # GHCR mirror of mcr.microsoft.com/playwright:v1.59.1-noble, maintained by
    # .github/workflows/mirror-playwright.yml. GHCR pulls are ~3-5s on GHA
    # runners vs ~27s from MCR. On Playwright bump: update the version in
    # apps/storybook/package.json, dispatch the mirror workflow with the new
    # tag, then update this line + the CLAUDE.md bullet.
    container:
      image: ghcr.io/${{ github.repository }}/playwright:v1.59.1-noble
    env:
      # The image pre-installs chromium to /ms-playwright, but GH Actions
      # overrides $HOME to /github/home inside containers so Playwright's
      # default lookup ($HOME/.cache/ms-playwright) misses. Point it at
      # the image's install dir explicitly.
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    permissions:
      contents: read
      actions: write
    strategy:
      matrix:
        node: [24]
    steps:
      - uses: actions/checkout@v6

      - name: Trust workspace inside container
        # Runner UID differs from checkout owner inside containers, which
        # makes git refuse to read the repo ("dubious ownership"). Turbo
        # uses git status for its dirty hash; we tell git to trust the
        # workspace path to silence the warning and restore reliable
        # cache keys.
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ matrix.node }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ matrix.node }}-

      - run: pnpm install --frozen-lockfile

      - name: Lint / format / typecheck / test / build
        id: checks
        run: |
          set -o pipefail
          pnpm turbo run lint format:check typecheck test build 2>&1 | tee .ci-checks.log

      - name: Storybook interaction tests
        run: |
          set -o pipefail
          pnpm turbo run test:storybook 2>&1 | tee .ci-storybook.log

      - name: Test results summary
        if: always()
        run: |
          {
            echo "## Test results"
            echo ""
            echo "### Unit tests (vitest)"
            echo ""
            echo '```'
            grep -E " (Test Files|Tests) +" .ci-checks.log 2>/dev/null || echo "(no summary lines parsed — see job log)"
            echo '```'
            echo ""
            echo "### Storybook interaction tests"
            echo ""
            echo '```'
            grep -E " (Test Files|Tests) +" .ci-storybook.log 2>/dev/null || echo "(no summary lines parsed — see job log)"
            echo '```'
            echo ""
            echo "Failure annotations (if any) appear inline on the **Files changed** tab via Vitest's auto-wired \`github-actions\` reporter."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build Storybook
        run: pnpm turbo run build:storybook

      - uses: actions/upload-artifact@v7
        with:
          name: storybook-static
          path: apps/storybook/storybook-static
          if-no-files-found: ignore
          retention-days: 7
