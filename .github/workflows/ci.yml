name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Pin to match apps/storybook/node_modules/playwright version. Bump in
    # the same PR as a Playwright upgrade — ships chromium + all system
    # deps pre-installed, so we skip `apt-get install` entirely.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    permissions:
      contents: read
      actions: write
    strategy:
      matrix:
        node: [24]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ matrix.node }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ matrix.node }}-

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run lint format:check typecheck test build

      - name: Storybook interaction tests
        run: pnpm turbo run test:storybook

      - name: Build Storybook
        run: pnpm turbo run build:storybook

      - uses: actions/upload-artifact@v7
        with:
          name: storybook-static
          path: apps/storybook/storybook-static
          if-no-files-found: ignore
          retention-days: 7
