name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Pin to match apps/storybook/node_modules/playwright version. Bump in
    # the same PR as a Playwright upgrade — ships chromium + all system
    # deps pre-installed, so we skip `apt-get install` entirely.
    # GHCR mirror of mcr.microsoft.com/playwright:v1.59.1-noble, maintained by
    # .github/workflows/mirror-playwright.yml. GHCR pulls are ~3-5s on GHA
    # runners vs ~27s from MCR. On Playwright bump: update the version in
    # apps/storybook/package.json, dispatch the mirror workflow with the new
    # tag, then update this line + the CLAUDE.md bullet.
    container:
      image: ghcr.io/${{ github.repository }}/playwright:v1.59.1-noble
      # `--ipc=host` per Playwright's container guidance
      # (https://playwright.dev/docs/docker). WebKit's multi-process
      # architecture needs a larger shared-memory region than GH
      # Actions' default 64 MB; without it the helper processes die
      # immediately and `browserContext.newPage` rejects with "Target
      # page, context or browser has been closed". Chromium tolerates
      # the default; WebKit doesn't.
      options: --ipc=host
    env:
      # The image pre-installs chromium to /ms-playwright, but GH Actions
      # overrides $HOME to /github/home inside containers so Playwright's
      # default lookup ($HOME/.cache/ms-playwright) misses. Point it at
      # the image's install dir explicitly.
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      # Firefox refuses to launch when $HOME isn't owned by the current
      # user, and `/github/home` hits exactly that case. Playwright's
      # own error message names this workaround verbatim. Setting it at
      # the job level so the bridge step's `$HOME/.cache/ms-playwright`
      # mirror and vitest-browser-playwright's lookup agree.
      HOME: /root
    permissions:
      contents: read
      actions: write
    strategy:
      matrix:
        node: [24]
    steps:
      - uses: actions/checkout@v6

      - name: Trust workspace inside container
        # Runner UID differs from checkout owner inside containers, which
        # makes git refuse to read the repo ("dubious ownership"). Turbo
        # uses git status for its dirty hash; we tell git to trust the
        # workspace path to silence the warning and restore reliable
        # cache keys.
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ matrix.node }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ matrix.node }}-

      - run: pnpm install --frozen-lockfile

      # `@vitest/browser-playwright` queries the default Playwright cache
      # (`$HOME/.cache/ms-playwright`) at launch and does not honor the
      # image's `PLAYWRIGHT_BROWSERS_PATH=/ms-playwright`, so the pre-installed
      # binaries at `/ms-playwright` go unused for our vitest-browser-mode
      # component tests in `packages/{blocks,addon}`. `@storybook/addon-vitest`
      # in `apps/storybook` resolves its own path and is unaffected.
      #
      # Hard-link the image's chromium-headless-shell directory into the
      # default path so vitest finds it without a fresh download. Cheap (a
      # few directory entries) and version-stable: bumping the playwright
      # image and the `playwright` devDep in lockstep keeps the binary
      # version matched to what vitest-browser-playwright expects.
      - name: Bridge image's Playwright binaries to vitest-browser default path
        shell: bash
        run: |
          mkdir -p "$HOME/.cache/ms-playwright"
          # Mirror every `<browser>-<rev>/` dir from /ms-playwright (image
          # pre-install) into the default location. `-L` follows the
          # symlinks the image may use; `--update=none` preserves any
          # existing destinations (portable form of the deprecated `-n`).
          cp -RL --update=none /ms-playwright/. "$HOME/.cache/ms-playwright/" || true
          ls "$HOME/.cache/ms-playwright" | head

      - name: Diagnose WebKit launch (temporary)
        shell: bash
        run: |
          set +e
          DEBUG=pw:browser* node -e "
            const { webkit } = require('playwright');
            (async () => {
              try {
                const browser = await webkit.launch({ headless: true });
                console.log('webkit launched OK');
                const ctx = await browser.newContext();
                const page = await ctx.newPage();
                console.log('newPage OK');
                await page.close();
                await ctx.close();
                await browser.close();
                console.log('cleanup OK');
              } catch (e) {
                console.error('WEBKIT FAILED:', e && e.stack || e);
                process.exit(0); // never fail the build on this diagnostic
              }
            })();
          " 2>&1 | sed -n '1,200p'
          echo "(diagnostic exit; build continues regardless)"

      - name: Lint / format / typecheck / test / build
        id: checks
        # Container image's default shell is `sh` (dash), which has no
        # `set -o pipefail`. Force bash so the pipe exit code propagates.
        shell: bash
        run: |
          set -o pipefail
          pnpm turbo run lint format:check typecheck test build 2>&1 | tee .ci-checks.log

      - name: Storybook interaction tests
        shell: bash
        run: |
          set -o pipefail
          pnpm turbo run test:storybook 2>&1 | tee .ci-storybook.log

      - name: Test results summary
        if: always()
        shell: bash
        run: |
          # Vitest colorizes its summary; strip ANSI so the markdown code
          # block reads as plain text instead of `\x1b[2m Test Files …`.
          strip_ansi='sed -E s/\x1B\[[0-9;]*[A-Za-z]//g'
          {
            echo "## Test results"
            echo ""
            echo "### Unit tests (vitest)"
            echo ""
            echo '```'
            grep -E " (Test Files|Tests) +" .ci-checks.log 2>/dev/null | $strip_ansi || echo "(no summary lines parsed — see job log)"
            echo '```'
            echo ""
            echo "### Storybook interaction tests"
            echo ""
            echo '```'
            grep -E " (Test Files|Tests) +" .ci-storybook.log 2>/dev/null | $strip_ansi || echo "(no summary lines parsed — see job log)"
            echo '```'
            echo ""
            echo "Failure annotations (if any) appear inline on the **Files changed** tab via Vitest's auto-wired \`github-actions\` reporter."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build Storybook
        run: pnpm turbo run build:storybook

      - uses: actions/upload-artifact@v7
        with:
          name: storybook-static
          path: apps/storybook/storybook-static
          if-no-files-found: ignore
          retention-days: 7
